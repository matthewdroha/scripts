emulfpgalog = CHECK_FPGA.log
effmstatuslog = effm_status.log
emulzselog = CHECK_ZSE.log

#[FEV]

lecundrptfile = [model_root]/collaterals/lec/[dut]/[alias].zmapped.rpt
lecrptfile = [model_root]/collaterals/lec/[dut]/[alias].summary.rpt
lecdir=[model_root]/collaterals/lec/[dut]
#ATTENTION: CHANGE/FIX VALUES HERE
#lectask needs to be set to rtl2nl for signoff, but if the IPs are running fev_lite, this key can be set to fev_lite
lectask=rtl2nl
topblockname=[alias]

#[MCP_FP]
#ATTENTION: CHANGE/FIX VALUES HERE
#the following path has the process directory (CICG74) in it as seen in CXLCM, if the process directory is different or not present, then please adjust this path appropriately
fishtailreport = [model_root]/output/[dut]/fishtail/PIC/fishtail_run/audit_report/*.ft_audit.rpt

#[Phys_Design_Enabling]
#rdtsynsummaryfile = [model_root]/output/[dut]/fc/*/synth_run/report/*.ipds.summary
mastersdc = [alias]_[dut].sdc
ipreleasepath = [model_root]/collaterals/sdc/[dut]/
synduetsummaryfile = [model_root]/collaterals/caliber/[dut]/reports/*.summary

#[Power_Intent]
vclpoutputdir = [model_root]/output/[dut]/vclp/
