##############Template override.ini file######################
### This override file is NOT intended to work as is and must be edited to work for a given IP

#ATTENTION: CHANGE/FIX VALUES HERE
#Set the following to be used for substitution in other keys
#For example: The alias given below is used for cxlcm. Please change this according to your own IP.
#alias = cxlcm_host_top,cxlcm_host,cxlcm_host_par
alias = alu

##Following keys are accessed by rules across categories
cheetah1 = False
cheetah2 = True
ipsoc = False


#[Build___Run]
iptype = sip
vcscompiledir = [model_root]/output/[dut]/vcs/*/vcs_compile/
topvcscompilelog = [dut].compile.log
vcssim_model_names = [dut]
vcssim_elabdir = [model_root]/output/[dut]/vcssim
vcssim_elablogfile = elab.log
ufe = False
rtlrptdir = [model_root]/tools/reports
acevcslogfile = [alias]_vcs.log
vcselablogdir = [model_root]/output/[dut]/vcs/*/vcs_elab/
vcselablogfile = elab.log
iproot = [model_root]

#[CDC]
cdcdir = [model_root]/collaterals/sgcdc/[dut]/
cdcdirspyglass = [model_root]/collaterals/sgcdc/[dut]/
rdcdirspyglass = [model_root]/collaterals/sgrdc/[dut]/
cdctopfile = cdc_hier_ctrl_[alias].v
cdcquesta = False
cdcquestacfm = False
cdcquestahdm = False
cdcspyglass = True
cdclintviolationsfilespyglass = [model_root]/collaterals/sgcdc/[dut]/*_cdc_verify_struct.run_cdc_verify_struct_violations_sgcdc.xml
rdclintviolationsfilespyglass = [model_root]/collaterals/sgrdc/[dut]/*_rdc_verify_struct.run_rdc_verify_struct_violations_sgcdc.xml

#[Collage]
ipxactsearchdir = [model_root]/collaterals/collage/[dut]/ipxact/*/2014/
topmodulename = alu
collagedir = [model_root]/collaterals/collage/[dut]/reports
collagesumrptfile = *.build.summary
collagewarnrptfile = *.build.warning

#[DFt]
sgdftsummaryfile = [model_root]/output/[dut]/sgdft/[alias]/dft_run/ipds_dft_sgdft.summary
atpgsummaryfile = [model_root]/output/[dut]/atpg/*/atpg_run/sage/WORK/*/reports/*ipds_dft_atpg.summary
synsummaryfile = [model_root]/collaterals/dc/[dut]/reports/*ipds*summary

#[Documentation]
docdir = [model_root]/doc

#[Emulation_FPGA]
emuldir = [model_root]/collaterals/effm*/[dut]/
