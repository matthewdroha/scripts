maxAmountOfLogs=3

outputDir=${WORKAREA}/output/grdlbuild_power

// NB settings
resourcesFile=resources.ini

// default to running via NB
// sched = nb

// block for NB results instead of returning
block = true

// Ensure stages connect by 'dependsOnComplete' are included in partial builds
DependsOnComplete = true

// Enables duts to share flow definitions and turn off stages that dont apply to that dut 
ConditionalsOn = true
